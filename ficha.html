<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BROKR — Ficha Técnica</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#1a2744;--navy2:#0f1829;--navy3:#243358;
  --teal:#2a9db5;--teal2:#3dbdd6;
  --gold:#c9a96e;--gold2:#e8c98a;
  --silver:#f4f6f9;--silver2:#e8ecf2;
  --txt:#1a2744;--mut:#6b7a99;--wh:#ffffff;
  --r:12px;--r2:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--silver);color:var(--txt);min-height:100vh}

/* ── SCREEN UI ── */
#app-ui{max-width:560px;margin:0 auto;padding:40px 24px}
.ui-logo{display:flex;align-items:center;gap:10px;margin-bottom:36px}
.ui-logo svg{height:28px}
.ui-title{font-family:'Playfair Display',serif;font-size:26px;color:var(--navy);margin-bottom:6px}
.ui-sub{font-size:14px;color:var(--mut);margin-bottom:28px;line-height:1.6}
.ui-card{background:var(--wh);border:1.5px solid var(--silver2);border-radius:var(--r);padding:28px;margin-bottom:16px}
.ui-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);margin-bottom:8px;display:block}
.ui-input{width:100%;background:var(--silver);border:1.5px solid var(--silver2);border-radius:var(--r2);padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--txt);outline:none;transition:border .15s;letter-spacing:.04em}
.ui-input:focus{border-color:var(--teal);background:var(--wh)}
.ui-input::placeholder{color:var(--mut);font-size:14px;letter-spacing:0}
.ui-hint{font-size:12px;color:var(--mut);margin-top:7px}
.ui-btn{display:block;width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:var(--r2);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;margin-top:14px;transition:background .15s}
.ui-btn:hover{background:var(--navy3)}
.ui-btn:disabled{background:var(--silver2);cursor:not-allowed;color:var(--mut)}
.ui-error{background:#fff3f3;border:1px solid #fcc;color:#c00;padding:11px 14px;border-radius:var(--r2);font-size:13px;margin-top:12px;display:none;line-height:1.5}
.ui-error.show{display:block}
.print-bar{display:none;gap:10px;margin-top:16px;flex-wrap:wrap}
.print-bar.show{display:flex}
.print-btn{display:flex;align-items:center;gap:8px;padding:11px 20px;background:var(--teal);color:#fff;border:none;border-radius:var(--r2);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
.print-btn:hover{background:var(--teal2)}
.back-btn{display:flex;align-items:center;gap:6px;padding:11px 16px;background:none;border:1.5px solid var(--silver2);border-radius:var(--r2);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--mut);cursor:pointer;transition:all .15s}
.back-btn:hover{border-color:var(--navy);color:var(--navy)}
.loading-bar{display:none;align-items:center;gap:10px;padding:14px;background:var(--teal-pale,#e8f7fa);border-radius:var(--r2);font-size:13px;color:var(--teal);margin-top:12px}
.loading-bar.show{display:flex}
.spinner{width:16px;height:16px;border:2px solid var(--teal2);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FICHA (print layout) ── */
#ficha{display:none}
#ficha.show{display:block}
.ficha-page{
  width:210mm;min-height:297mm;margin:0 auto 24px;
  background:var(--wh);position:relative;overflow:hidden;
  box-shadow:0 4px 40px rgba(26,39,68,.18);
}

/* Cover */
.ficha-cover{width:100%;height:297mm;position:relative;display:flex;flex-direction:column}
.cover-hero{width:100%;height:62%;object-fit:cover;display:block;flex-shrink:0}
.cover-hero-bg{width:100%;height:62%;background:linear-gradient(135deg,var(--navy2),var(--navy3));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cover-overlay{position:absolute;top:0;left:0;right:0;height:62%;background:linear-gradient(to bottom,rgba(15,24,41,.25) 0%,rgba(15,24,41,.72) 100%)}

/* Brand area top-left (agente) */
.cover-brand-agente{
  position:absolute;top:22px;left:24px;
  display:flex;align-items:center;gap:10px;
}
.cover-brand-logo{
  max-height:48px;max-width:140px;object-fit:contain;
  filter:brightness(0) invert(1);opacity:.9;
}
/* Placeholder cuando no hay logo */
.cover-brand-placeholder{
  height:44px;width:140px;
  background:rgba(255,255,255,.1);
  border:1px dashed rgba(255,255,255,.3);
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
}
.cover-brand-placeholder span{
  font-size:10px;color:rgba(255,255,255,.4);
  letter-spacing:.06em;text-transform:uppercase;
}

.cover-tipo{
  position:absolute;top:22px;right:24px;
  background:var(--gold);color:var(--navy2);
  font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  padding:5px 14px;border-radius:20px;
}
.cover-price-block{
  position:absolute;bottom:38.5%;left:0;right:0;
  padding:0 24px 18px;
}
.cover-precio{
  font-family:'Playfair Display',serif;font-size:34px;font-weight:700;
  color:#fff;margin-bottom:3px;text-shadow:0 2px 10px rgba(0,0,0,.35);
}
.cover-titulo{font-size:15px;font-weight:400;color:rgba(255,255,255,.85);margin-bottom:5px}
.cover-ubicacion{font-size:12.5px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:4px}

.cover-body{flex:1;padding:22px 24px 60px;background:var(--wh)}
.cover-specs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.spec-item{text-align:center;padding:12px 6px;background:var(--silver);border-radius:8px}
.spec-ico{font-size:17px;margin-bottom:3px}
.spec-val{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;color:var(--navy);line-height:1.1}
.spec-lbl{font-size:9.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.07em;margin-top:2px}
.cover-desc-ttl{font-family:'Playfair Display',serif;font-size:15px;color:var(--navy);margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--silver2)}
.cover-desc{font-size:12px;color:#4a5568;line-height:1.75}

/* Content pages */
.ficha-content{width:100%;min-height:297mm;padding:26px 24px 64px;background:var(--wh);position:relative}
.sec-ttl{
  font-family:'Playfair Display',serif;font-size:16px;color:var(--navy);
  margin-bottom:14px;padding-bottom:7px;
  border-bottom:2px solid var(--navy);
  display:flex;align-items:center;gap:8px;
}

/* Photo layouts */
.photo-pair{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.photo-pair img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:8px;display:block}

/* Characteristics table */
.char-cols{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;margin-bottom:18px}
.char-col{display:flex;flex-direction:column}
.char-item{display:flex;justify-content:space-between;align-items:baseline;padding:7px 10px;border-bottom:1px solid var(--silver2);font-size:12px;gap:8px}
.char-item:nth-child(odd){background:var(--silver)}
.char-item:last-child{border-bottom:none}
.char-lbl{color:var(--mut);font-weight:500;flex-shrink:0}
.char-val{color:var(--navy);font-weight:600;text-align:right}

/* Amenidades */
.amen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:18px}
.amen-item{display:flex;align-items:center;gap:6px;padding:7px 9px;background:var(--silver);border-radius:6px;font-size:11.5px;color:var(--txt)}
.amen-item::before{content:'✓';color:var(--teal);font-weight:700;font-size:10px;flex-shrink:0}

/* Contacto */
.contacto-box{
  background:var(--navy2);border-radius:10px;
  padding:18px 22px;display:flex;align-items:center;gap:18px;
  margin-top:14px;
}
/* Placeholder foto agente */
.contacto-foto-ph{
  width:62px;height:62px;border-radius:50%;
  background:var(--navy3);border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
}
.contacto-foto{width:62px;height:62px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);flex-shrink:0}
.contacto-info{flex:1}
.contacto-name{font-family:'Playfair Display',serif;font-size:15px;color:#fff;margin-bottom:1px}
.contacto-role{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.contacto-datos{display:flex;flex-direction:column;gap:3px}
.contacto-dato{font-size:11.5px;color:rgba(255,255,255,.72);display:flex;align-items:center;gap:5px}
/* Placeholder nombre/datos */
.contacto-dato.ph{color:rgba(255,255,255,.25);font-style:italic}
.contacto-logo-ph{
  width:90px;height:36px;
  background:rgba(255,255,255,.07);
  border:1px dashed rgba(255,255,255,.2);
  border-radius:6px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.contacto-logo-ph span{font-size:9px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.06em}
.contacto-logo{max-height:36px;max-width:90px;object-fit:contain;filter:brightness(0) invert(1);opacity:.8;flex-shrink:0}

/* Footer every page */
.ficha-footer{
  position:absolute;bottom:0;left:0;right:0;height:50px;
  background:var(--navy2);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.ft-txt{font-size:9.5px;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.1em;font-weight:500}
.ft-logo{height:15px;opacity:.65}
.ft-div{width:1px;height:12px;background:rgba(255,255,255,.18)}
.ft-id{font-size:9.5px;color:rgba(255,255,255,.25)}

/* Print */
@media print{
  body{background:#fff}
  #app-ui{display:none!important}
  #ficha{display:block!important}
  .ficha-page{box-shadow:none;margin:0;page-break-after:always}
  .ficha-page:last-child{page-break-after:avoid}
  @page{size:A4;margin:0}
}
</style>
</head>

// ── FETCH PROPERTY ──
async function generarFicha(){
  hideError();
  const id = g('prop-id').value.trim().toUpperCase();
  if(!id){ showError('Ingresa el ID de la propiedad.'); return; }

  setLoading(true, 'Consultando EasyBroker...');

  try {
    const res = await fetch(`${API}/propiedad/${encodeURIComponent(id)}`, {
      method: 'GET',
      headers: { 'Accept': 'application/json' }
    });

    if(!res.ok){
      let detail = 'Error al consultar la propiedad';
      try { const j = await res.json(); detail = j.detail || detail; } catch(e){}
      throw new Error(detail);
    }

    const p = await res.json();
    setLoading(false);
    renderFicha(p);

  } catch(e) {
    setLoading(false);
    if(e.message === 'Failed to fetch'){
      showError(`No se pudo conectar al servidor.<br><br>
        <strong>Solución:</strong> Este archivo necesita abrirse desde un servidor web, no directo desde tu computadora.<br>
        Sigue estos pasos:<br>
        1. Sube <code>brokr_ficha.html</code> a tu repositorio de GitHub<br>
        2. Activa GitHub Pages en ese repositorio<br>
        3. Abre la URL de GitHub Pages para usar la ficha`);
    } else {
      showError(e.message);
    }
  }
}

// ── RENDER ──
function renderFicha(p){
  const id       = p.public_id || p.id || '—';
  const titulo   = p.title || p.property_type || 'Propiedad';
  const op       = p.operations?.[0];
  const tipo_op  = op?.type === 'sale' ? 'EN VENTA' : op?.type === 'rental' ? 'EN RENTA' : 'EN VENTA';
  const precio   = op ? `${fmt(op.amount)} ${op.currency||'MXN'}` : '—';
  const ciudad   = p.location?.city || '';
  const colonia  = p.location?.name || '';
  const dir      = p.address || '';
  const ubicacion= [colonia, ciudad].filter(Boolean).join(', ') || dir || '—';
  const rec      = p.bedrooms;
  const ban      = p.bathrooms;
  const mban     = p.half_bathrooms;
  const m2c      = p.construction_size;
  const m2t      = p.lot_size;
  const desc     = (p.description||'').replace(/<[^>]*>/g,'').trim();
  const amenids  = p.amenities || [];
  const fotos    = p.property_images || [];
  const parking  = p.parking_spaces;
  const pisos    = p.floors;
  const edad     = p.age;
  const tipo_inm = p.property_type || '';
  const estatus  = p.status || '';

  // ── PAGE 1: PORTADA ──
  const heroSrc = fotos[0]?.url || fotos[0]?.original || null;
  const heroHTML = heroSrc
    ? `<img class="cover-hero" src="${heroSrc}" alt="foto principal"/>`
    : `<div class="cover-hero-bg"><svg width="56" height="56" fill="none" viewBox="0 0 24 24" stroke="rgba(255,255,255,0.2)" stroke-width="1"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg></div>`;

  const specs = [];
  if(rec)  specs.push({ico:'🛏', val:rec, lbl:'Recámaras'});
  if(ban)  specs.push({ico:'🚿', val:ban, lbl:'Baños'});
  if(m2c)  specs.push({ico:'📐', val:m2c, lbl:'m² Const.'});
  if(m2t)  specs.push({ico:'🌿', val:m2t, lbl:'m² Terreno'});
  if(parking && specs.length < 4) specs.push({ico:'🚗', val:parking, lbl:'Estacion.'});

  const specsHTML = specs.slice(0,4).map(s =>
    `<div class="spec-item">
      <div class="spec-ico">${s.ico}</div>
      <div class="spec-val">${s.val}</div>
      <div class="spec-lbl">${s.lbl}</div>
    </div>`
  ).join('');

  const descPortada = desc;

  let html = `
  <div class="ficha-page">
    <div class="ficha-cover">
      ${heroHTML}
      <div class="cover-overlay"></div>
      <!-- ESPACIO LOGO AGENTE (se habilitará en próxima versión) -->
      <div class="cover-brand-agente">
        <div class="cover-brand-placeholder"><span>Tu logo aquí</span></div>
      </div>
      <div class="cover-tipo">${tipo_op}</div>
      <div class="cover-price-block">
        <div class="cover-precio">${precio}</div>
        <div class="cover-titulo">${titulo}</div>
        <div class="cover-ubicacion">📍 ${ubicacion}</div>
      </div>
      <div class="cover-body">
        ${specs.length ? `<div class="cover-specs">${specsHTML}</div>` : ''}
        ${descPortada ? `<div class="cover-desc-ttl">Descripción</div><div class="cover-desc">${descPortada}</div>` : ''}
      </div>
    </div>
    ${footer(id)}
  </div>`;

  // ── PHOTO PAGES ──
  const restFotos = fotos.slice(1);
  if(restFotos.length > 0){
    let i = 0;
    while(i < restFotos.length){
      const page = restFotos.slice(i, i+6);
      i += 6;
      const imgs = page.map(f => f.url || f.original).filter(Boolean);
      if(!imgs.length) continue;

      // Always 2 photos per row, square aspect ratio
      let gridHTML = '';
      for(let r=0; r<imgs.length; r+=2){
        const pair = imgs.slice(r, r+2);
        gridHTML += `<div class="photo-pair">${pair.map(s=>`<img src="${s}" alt="foto"/>`).join('')}</div>`;
      }

      html += `
      <div class="ficha-page">
        <div class="ficha-content">
          <div class="sec-ttl">Galería fotográfica</div>
          ${gridHTML}
        </div>
        ${footer(id)}
      </div>`;
    }
  }

  // ── CARACTERÍSTICAS + AMENIDADES + CONTACTO ──
  const rows = [];
  if(tipo_inm)  rows.push(['Tipo de inmueble', tipo_inm]);
  if(tipo_op)   rows.push(['Operación', tipo_op]);
  if(precio)    rows.push(['Precio', precio]);
  if(rec)       rows.push(['Recámaras', rec]);
  if(ban)       rows.push(['Baños completos', ban]);
  if(mban)      rows.push(['Medios baños', mban]);
  if(m2c)       rows.push(['Superficie construida', fmtM2(m2c)]);
  if(m2t)       rows.push(['Superficie de terreno', fmtM2(m2t)]);
  if(parking)   rows.push(['Estacionamientos', parking]);
  if(pisos)     rows.push(['Niveles', pisos]);
  if(edad){
    // EasyBroker stores year built, calculate elapsed years
    const anioConst = parseInt(edad);
    const anioActual = new Date().getFullYear();
    if(anioConst > 1900 && anioConst <= anioActual){
      const anosTranscurridos = anioActual - anioConst;
      rows.push(['Antigüedad', anosTranscurridos === 0 ? 'Nuevo' : anosTranscurridos + (anosTranscurridos === 1 ? ' año' : ' años')]);
    } else {
      rows.push(['Antigüedad', edad + ' años']);
    }
  }
  if(colonia)   rows.push(['Colonia', colonia]);
  if(ciudad)    rows.push(['Ciudad', ciudad]);
  if(estatus)   rows.push(['Estatus', estatus]);
  if(id)        rows.push(['Clave de propiedad', id]);

  // rows will be split into two columns after render

  const amenHTML = amenids.length
    ? `<div class="sec-ttl" style="margin-top:16px">Amenidades</div>
       <div class="amen-grid">${amenids.map(a=>`<div class="amen-item">${a.name||a}</div>`).join('')}</div>`
    : '';

  // Inject first (cover + photo pages)
  const el = g('ficha');
  el.innerHTML = html;

  // Now append characteristics to the LAST page's content div
  // so they flow naturally after the photos if space allows
  const allPages = el.querySelectorAll('.ficha-content');
  const lastContent = allPages[allPages.length - 1];

  if(lastContent){
    // Append chars section to last existing page
    const charDiv = document.createElement('div');
    charDiv.innerHTML = `
      <div class="sec-ttl" style="margin-top:18px">Características del inmueble</div>
      <div class="char-cols" id="char-cols-${id}">
        <div class="char-col" id="char-col-a-${id}"></div>
        <div class="char-col" id="char-col-b-${id}"></div>
      </div>
      ${amenHTML}`;
    lastContent.appendChild(charDiv);
  } else {
    // No photo pages at all — standalone characteristics page
    el.innerHTML += `
    <div class="ficha-page">
      <div class="ficha-content">
        <div class="sec-ttl">Características del inmueble</div>
        <div class="char-cols" id="char-cols-${id}">
          <div class="char-col" id="char-col-a-${id}"></div>
          <div class="char-col" id="char-col-b-${id}"></div>
        </div>
        ${amenHTML}
      </div>
      ${footer(id)}
    </div>`;
  }

  // Split characteristics into two columns
  const mid = Math.ceil(rows.length / 2);
  const colA = g('char-col-a-'+id);
  const colB = g('char-col-b-'+id);
  if(colA && colB){
    rows.slice(0, mid).forEach(([k,v]) => {
      const div = document.createElement('div');
      div.className = 'char-item';
      div.innerHTML = `<span class="char-lbl">${k}</span><span class="char-val">${v}</span>`;
      colA.appendChild(div);
    });
    rows.slice(mid).forEach(([k,v]) => {
      const div = document.createElement('div');
      div.className = 'char-item';
      div.innerHTML = `<span class="char-lbl">${k}</span><span class="char-val">${v}</span>`;
      colB.appendChild(div);
    });
  }

  el.classList.add('show');
  g('print-bar').classList.add('show');
  el.scrollIntoView({behavior:'smooth', block:'start'});
}

function resetFicha(){
  g('ficha').innerHTML='';
  g('ficha').classList.remove('show');
  g('print-bar').classList.remove('show');
  g('gen-btn').disabled=false;
  g('prop-id').value='';
  hideError();
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
